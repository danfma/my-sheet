name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build MySheet.slnx -c Release

      - name: Test
        run: dotnet run --project tests/MySheet.Tests/MySheet.Tests.csproj -c Release --no-build
