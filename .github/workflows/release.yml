name: Release

# Manual, separate from CI: does NOT publish on every push to main.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version bump commit + tag and create the GitHub release
      id-token: write # OIDC token for NuGet trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so versionize can analyze conventional commits
          # Push with an admin PAT, not the default GITHUB_TOKEN: the "Push commit and tag" step
          # pushes directly to the protected `main`, and the branch ruleset only bypasses the
          # Repository Admin role. GITHUB_TOKEN (github-actions[bot]) is not an admin, so its push is
          # rejected by required status checks / code scanning. RELEASE_TOKEN is a fine-grained PAT of
          # a repo admin, so its push matches the ruleset's admin bypass.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install versionize
        run: |
          dotnet tool install --global Versionize
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # versionize (run at the repo root) bumps <Version> in every versioned csproj in lockstep
      # (Danfma.MySheet + Danfma.MySheet.Excel), writes the root CHANGELOG.md, commits and tags (vX.Y.Z)
      # locally. The commit/tag are only pushed AFTER a successful publish, so a failed publish leaves
      # main clean.
      - name: Bump version
        run: versionize

      - name: Pack
        run: |
          dotnet pack Danfma.MySheet/Danfma.MySheet.csproj -c Release -o artifacts
          dotnet pack Danfma.MySheet.Excel/Danfma.MySheet.Excel.csproj -c Release -o artifacts

      - name: NuGet login (OIDC → temporary API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }} # your nuget.org username (profile name), NOT your email

      - name: Publish to NuGet
        run: >
          dotnet nuget push artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push commit and tag
        run: git push --follow-tags origin HEAD:main

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          gh release create "$TAG" artifacts/*.nupkg --title "$TAG" --generate-notes
